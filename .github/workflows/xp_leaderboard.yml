name: Run XP Scraper

on:
  schedule:
    - cron: '42 09 * * *' # 09:42 AM UTC
  workflow_dispatch: 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt-in to the new Node 24 engine

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated for Node 24 support
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests playwright-stealth
          playwright install chromium

      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adding all potential JSON files safely
          git add xp_log.json personal_bests.json streaks.json totals_history.json || true
          
          # Only commit if there are actual changes to save
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update XP logs and PBs"
            git push
          else
            echo "No changes to commit"
          fi
