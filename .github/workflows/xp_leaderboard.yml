name: Tibia XP Tracker

on:
  schedule:
    # Runs at 10:30, 13:30, 16:30, and 19:30 UTC every day
    - cron: '30 10,13,16,19 * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # CHANGED: Swapped to tf-playwright-stealth to fix the Import Error
          pip install playwright beautifulsoup4 requests tf-playwright-stealth
          
      - name: Install Playwright Browsers & Linux Dependencies
        run: playwright install chromium --with-deps

      - name: Run XP Scraper Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # This wildcard adds the new post_state.json memory file 
          # along with your xp_logs, streaks, and PBs.
          git add *.json || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update XP logs, PBs, and Bot Memory"
            git push
          else
            echo "No changes to commit"
          fi
