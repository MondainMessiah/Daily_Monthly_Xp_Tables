name: Run XP Scraper

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 AM UTC
  workflow_dispatch: 

# --- ADD THIS SECTION ---
permissions:
  contents: write
# ------------------------

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium

      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xp_log.json personal_bests.json streaks.json totals_history.json
          # This line prevents the error if no one gained XP today
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update XP logs and PBs" && git push)
