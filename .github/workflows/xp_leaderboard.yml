name: Tibia XP Tracker

on:
  schedule:
    # Runs at 09:45 UTC (09:45 AM UK) 
    # This provides a 45-minute buffer after Server Save for GuildStats to update.
    - cron: '45 9 * * *'
  workflow_dispatch: # Allows you to run the bot manually via the "Actions" tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run XP Scraper Script
        env:
          # These must match the names you saved in GitHub Repo Secrets
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all JSON files that the script might have updated
          git add xp_log.json post_state.json streaks.json xp_totals.json
          
          # Only commit if there are actually changes to the data
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 Auto-update XP logs and streaks [skip ci]"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
