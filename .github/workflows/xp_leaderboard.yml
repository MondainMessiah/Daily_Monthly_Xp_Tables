name: Tibia XP Tracker

on:
  schedule:
    # Runs at 09:45 UTC (09:15 AM UK) - The sweet spot after Server Save
    - cron: '45 9 * * *'
  workflow_dispatch: # Keeps the manual "Run" button active

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Speed up by only installing what we actually use
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run XP Scraper Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # This catches logs, totals, streaks, and state files
          git add *.json 
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 Auto-update XP logs and streaks [skip ci]"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
