name: Tibia XP Tracker

on:
  schedule:
    # 08:25 UTC = 09:25 AM UK (BST)
    # Shifting back by 1 hour to account for the UK's BST +1 offset
    # and GitHub's typical morning scheduling delay.
    - cron: '25 8 * * *'
  workflow_dispatch: # Allows you to run the bot manually via the "Actions" tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # We run Version 48 of the script here
      - name: Run XP Scraper Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python scrape_xp_tab9.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adding all relevant data files to the commit
          git add xp_log.json post_state.json streaks.json xp_totals.json personal_bests.json
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 Auto-update XP logs and streaks [skip ci]"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
